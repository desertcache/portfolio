<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Arcade | Samuel Bates</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Space Mono', monospace;
      background: #e5e5e5;
      color: #000;
      padding: 1.5rem;
      min-height: 100vh;
      display: flex;
      justify-content: center;
    }
    .shell {
      width: 100%;
      max-width: 1200px;
      background: #fff;
      border: 4px solid #000;
      box-shadow: 12px 12px 0px #000;
    }

    /* Header */
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1rem;
      border-bottom: 4px solid #000;
    }
    .logo { font-weight: 700; font-size: 1.5rem; letter-spacing: -0.05em; text-decoration: none; color: #000; }
    .logo span { color: #2563eb; }
    nav a { font-weight: 700; font-size: 0.875rem; text-transform: uppercase; text-decoration: none; color: #000; margin-left: 2rem; }
    nav a:hover { text-decoration: underline; }

    /* Hero */
    .hero-section {
      padding: 2rem;
      border-bottom: 4px solid #000;
      text-align: center;
    }
    .hero-section h1 { font-size: 3rem; font-weight: 900; text-transform: uppercase; letter-spacing: -0.05em; margin-bottom: 0.5rem; }
    .hero-section p { font-weight: 700; text-transform: uppercase; font-size: 0.875rem; opacity: 0.6; }

    /* Cabinet */
    .arcade-cabinet {
      padding: 2rem;
      display: flex;
      align-items: center;
      justify-content: center;
      border-bottom: 4px solid #000;
      background: #f4f4f0;
      position: relative;
      overflow: hidden;
      min-height: 500px;
    }
    canvas {
      border: 4px solid #000;
      background: #111;
      display: block;
      max-width: 100%;
      z-index: 10;
    }

    /* Menu & overlays */
    #arcade-menu, #game-over-screen {
      position: absolute;
      z-index: 20;
      text-align: center;
      color: #fff;
    }
    #arcade-menu h2 {
      font-family: 'Space Mono', monospace;
      font-size: 1.75rem;
      font-weight: 900;
      text-transform: uppercase;
      margin-bottom: 1.5rem;
      letter-spacing: 0.1em;
    }
    .menu-buttons { display: flex; gap: 0.75rem; justify-content: center; flex-wrap: wrap; }
    .arcade-btn {
      font-family: 'Space Mono', monospace;
      font-weight: 700;
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      border: 4px solid #000;
      color: #000;
      padding: 0.875rem 2rem;
      cursor: pointer;
      min-width: 180px;
      transition: all 0.15s ease;
    }
    .arcade-btn:hover { transform: translate(-2px, -2px); box-shadow: 4px 4px 0px #000; }
    #btn-snake { background: #93c5fd; }
    #btn-flappy { background: #c4b5fd; }
    #btn-breakout { background: #f9a8d4; }
    #btn-asteroids { background: #67e8f9; }

    /* Game over */
    #game-over-screen { display: none; }
    #game-over-screen h2 {
      font-family: 'Space Mono', monospace;
      font-size: 2.5rem; font-weight: 900; text-transform: uppercase;
      color: #ef4444;
      text-shadow: 0 0 20px rgba(239, 68, 68, 0.4);
      margin-bottom: 0.5rem;
    }
    #final-score { font-size: 1.25rem; margin-bottom: 1.5rem; opacity: 0.8; }
    .game-btn {
      font-family: 'Space Mono', monospace;
      font-weight: 700; font-size: 0.8rem; text-transform: uppercase;
      border: 4px solid #000;
      background: #fff;
      color: #000;
      padding: 0.75rem 2rem;
      cursor: pointer;
      min-width: 160px;
      transition: all 0.15s ease;
    }
    .game-btn:hover { transform: translate(-2px, -2px); box-shadow: 4px 4px 0px #000; }

    /* HUD */
    #hud-score {
      position: absolute;
      top: 1.5rem; left: 2.5rem;
      z-index: 15;
      color: rgba(255,255,255,0.7);
      font-family: 'Space Mono', monospace;
      font-size: 1rem;
      font-weight: 700;
      display: none;
      letter-spacing: 0.05em;
    }

    /* Touch hint (mobile only) */
    .touch-hint {
      display: none;
      padding: 0.5rem;
      background: #fff;
      color: #000;
      text-align: center;
      font-size: 0.625rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      opacity: 0.4;
      border-bottom: 4px solid #000;
    }

    /* On-screen controls: hidden, kept for arcade.js compatibility */
    .mobile-controls { display: none !important; }

    /* Instructions */
    .instructions {
      padding: 1rem;
      text-align: center;
      font-weight: 700;
      text-transform: uppercase;
      font-size: 0.75rem;
      opacity: 0.5;
      border-bottom: 4px solid #000;
    }

    /* Footer */
    footer {
      padding: 1rem;
      text-align: center;
      font-weight: 700;
      font-size: 0.75rem;
      text-transform: uppercase;
      opacity: 0.5;
    }

    /* ========== MOBILE ========== */
    @media (max-width: 768px) {
      body { padding: 0; margin: 0; background: #e5e5e5; min-height: 100vh; min-height: 100dvh; }
      .shell { border: none; box-shadow: none; min-height: 100vh; min-height: 100dvh; display: flex; flex-direction: column; }
      .arcade-cabinet { flex: 1; }

      header { display: none; }
      .hero-section {
        padding: 0.75rem;
        border-bottom-width: 3px;
      }
      .hero-section h1 { font-size: 1.25rem; margin-bottom: 0; }
      .hero-section p { display: none; }
      .instructions { display: none; }
      footer { display: none; }
      .touch-hint { display: block; border-bottom-width: 3px; }

      .arcade-cabinet {
        padding: 0;
        min-height: auto;
        border-bottom-width: 3px;
        background: #111;
      }
      canvas { border: none; width: 100%; }

      /* Menu: brutalist buttons stacked */
      #arcade-menu { width: 100%; padding: 0 1rem; }
      #arcade-menu h2 { font-size: 1.25rem; margin-bottom: 1rem; letter-spacing: 0.15em; }
      .menu-buttons { flex-direction: column; gap: 0.5rem; width: 100%; }
      .arcade-btn {
        min-width: unset;
        width: 100%;
        padding: 1rem;
        font-size: 0.8rem;
        border-width: 3px;
      }

      /* Game over */
      #game-over-screen { width: 100%; padding: 0 1rem; }
      #game-over-screen h2 { font-size: 1.75rem; }
      .gameover-buttons { flex-direction: column; width: 100%; gap: 0.5rem; }
      .game-btn { min-width: unset; width: 100%; border-width: 3px; }

      #hud-score { top: 0.75rem; left: 1rem; font-size: 0.875rem; }
    }

    /* Landscape mobile */
    @media (max-width: 768px) and (orientation: landscape) {
      .hero-section { display: none; }
      .touch-hint { display: none; }
    }
  </style>
</head>
<body>
  <div class="shell">
    <header>
      <a href="/portfolio/#/" class="logo">SB<span>.</span></a>
      <nav>
        <a href="/portfolio/#/">[01] HOME</a>
        <a href="/portfolio/#/work">[02] WORK</a>
        <a href="/portfolio/#/about">[03] ABOUT</a>
        <a href="arcade.html" style="text-decoration: underline">[04] ARCADE</a>
      </nav>
    </header>

    <div class="hero-section">
      <h1>THE ARCADE.</h1>
      <p>// Take a break. Play some games built with raw HTML5 Canvas and vanilla JS physics.</p>
    </div>

    <div class="arcade-cabinet">
      <canvas id="gameCanvas" width="800" height="500"></canvas>

      <div id="arcade-menu">
        <h2>Select Game</h2>
        <div class="menu-buttons">
          <button id="btn-snake" class="arcade-btn">[NEON SNAKE]</button>
          <button id="btn-flappy" class="arcade-btn">[FLAPPY UFO]</button>
          <button id="btn-breakout" class="arcade-btn">[BREAKOUT]</button>
          <button id="btn-asteroids" class="arcade-btn">[ASTEROIDS]</button>
        </div>
      </div>

      <div id="game-over-screen">
        <h2>GAME OVER</h2>
        <p id="final-score">Score: 0</p>
        <div class="gameover-buttons" style="display: flex; gap: 0.75rem; justify-content: center;">
          <button id="btn-restart" class="game-btn">[PLAY AGAIN]</button>
          <button id="btn-menu" class="game-btn">[MAIN MENU]</button>
        </div>
      </div>

      <div id="hud-score">
        Score: <span id="current-score">0</span>
      </div>
    </div>

    <div class="touch-hint">Swipe // Tap // Drag to play</div>

    <!-- Hidden: arcade.js references this element -->
    <div id="mobile-controls" class="mobile-controls"></div>

    <div class="instructions">
      Desktop: Arrows / Space / Mouse
    </div>

    <footer>
      // SAMUEL BATES &bull; ARCADE &bull; 2026
    </footer>
  </div>

  <script>
    // Force 60fps cap: override requestAnimationFrame so arcade.js
    // game loops run at consistent 60fps regardless of display refresh rate.
    // Fixes slow-mo on 30fps-throttled mobile and double-speed on 120Hz.
    (function() {
      var _raf = window.requestAnimationFrame;
      var lastTime = 0;
      var targetInterval = 1000 / 60; // 16.67ms
      window.requestAnimationFrame = function(callback) {
        return _raf(function(now) {
          if (now - lastTime >= targetInterval) {
            lastTime = now - ((now - lastTime) % targetInterval);
            callback(now);
          } else {
            _raf(function(t) { callback(t); });
          }
        });
      };
    })();
  </script>
  <script src="arcade.js"></script>
</body>
</html>
