<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Arcade | Samuel Bates</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Space Mono', monospace;
      background: #e5e5e5;
      color: #000;
      padding: 1.5rem;
      min-height: 100vh;
      display: flex;
      justify-content: center;
    }
    .shell {
      width: 100%;
      max-width: 1200px;
      background: #fff;
      border: 4px solid #000;
      box-shadow: 12px 12px 0px #000;
    }

    /* Navbar */
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1rem;
      border-bottom: 4px solid #000;
    }
    .logo {
      font-weight: 700;
      font-size: 1.5rem;
      letter-spacing: -0.05em;
      text-decoration: none;
      color: #000;
    }
    .logo span { color: #2563eb; }
    nav a {
      font-weight: 700;
      font-size: 0.875rem;
      text-transform: uppercase;
      text-decoration: none;
      color: #000;
      margin-left: 2rem;
    }
    nav a:hover { text-decoration: underline; }

    /* Hero */
    .hero {
      padding: 2rem;
      border-bottom: 4px solid #000;
      text-align: center;
    }
    .hero h1 {
      font-size: 3rem;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: -0.05em;
      margin-bottom: 0.5rem;
    }
    .hero p {
      font-weight: 700;
      text-transform: uppercase;
      font-size: 0.875rem;
      opacity: 0.7;
    }

    /* Cabinet */
    .cabinet {
      padding: 2rem;
      display: flex;
      justify-content: center;
      border-bottom: 4px solid #000;
      background: #f4f4f0;
    }
    canvas {
      border: 4px solid #000;
      background: #111;
      display: block;
      max-width: 100%;
    }

    /* Menu overlay */
    .menu-overlay {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.85);
      z-index: 10;
    }
    .menu-overlay h2 {
      color: #fff;
      font-size: 2rem;
      font-weight: 900;
      text-transform: uppercase;
      margin-bottom: 1.5rem;
    }
    .menu-btn {
      font-family: 'Space Mono', monospace;
      font-weight: 700;
      font-size: 0.875rem;
      text-transform: uppercase;
      border: 4px solid #fff;
      background: transparent;
      color: #fff;
      padding: 0.75rem 2rem;
      margin: 0.25rem 0;
      cursor: pointer;
      min-width: 200px;
      transition: background 0.15s, color 0.15s;
    }
    .menu-btn:hover {
      background: #fff;
      color: #000;
    }
    .menu-btn.blue:hover { background: #3b82f6; color: #fff; }
    .menu-btn.purple:hover { background: #8b5cf6; color: #fff; }
    .menu-btn.pink:hover { background: #ec4899; color: #fff; }
    .menu-btn.cyan:hover { background: #06b6d4; color: #fff; }

    /* Game over */
    .gameover-overlay {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.85);
      z-index: 10;
    }
    .gameover-overlay h2 {
      color: #ff3333;
      font-size: 2.5rem;
      font-weight: 900;
      text-transform: uppercase;
      margin-bottom: 0.5rem;
    }
    .gameover-overlay .score {
      color: #fff;
      font-size: 1.25rem;
      font-weight: 700;
      margin-bottom: 1.5rem;
    }

    /* HUD */
    .hud {
      position: absolute;
      top: 10px;
      left: 14px;
      color: #fff;
      font-size: 0.875rem;
      font-weight: 700;
      display: none;
      z-index: 5;
      text-shadow: 0 0 4px rgba(0,0,0,0.8);
    }

    /* Mobile controls */
    .mobile-controls {
      display: none;
      padding: 1rem;
      border-bottom: 4px solid #000;
      justify-content: space-between;
      align-items: center;
    }
    .dpad {
      display: grid;
      grid-template-areas: ". up ." "left . right" ". down .";
      gap: 4px;
    }
    .dpad button {
      width: 48px;
      height: 48px;
      border: 3px solid #000;
      background: #fff;
      font-family: 'Space Mono', monospace;
      font-weight: 700;
      font-size: 1.25rem;
      cursor: pointer;
    }
    .dpad .up { grid-area: up; }
    .dpad .left { grid-area: left; }
    .dpad .right { grid-area: right; }
    .dpad .down { grid-area: down; }
    .action-btns { display: flex; gap: 8px; }
    .action-btns button {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      border: 3px solid #000;
      background: #fff;
      font-family: 'Space Mono', monospace;
      font-weight: 700;
      cursor: pointer;
    }
    .action-btns .btn-a { background: #dbeafe; }
    .action-btns .btn-b { background: #fee2e2; }

    /* Instructions */
    .instructions {
      padding: 1rem;
      text-align: center;
      font-weight: 700;
      text-transform: uppercase;
      font-size: 0.75rem;
      opacity: 0.6;
      border-bottom: 4px solid #000;
    }

    /* Footer */
    footer {
      padding: 1rem;
      text-align: center;
      font-weight: 700;
      font-size: 0.75rem;
      text-transform: uppercase;
      opacity: 0.6;
    }

    @media (max-width: 768px) {
      body { padding: 0.5rem; }
      .shell { border-width: 3px; box-shadow: 6px 6px 0px #000; }
      header, .hero, .cabinet, .instructions, footer { border-bottom-width: 3px; }
      .hero h1 { font-size: 1.75rem; }
      nav { display: none; }
      .mobile-controls { display: flex; }
    }
  </style>
</head>
<body>
  <div class="shell">
    <header>
      <a href="#/" class="logo">SB<span>.</span></a>
      <nav>
        <a href="#/">[01] HOME</a>
        <a href="#/work">[02] WORK</a>
        <a href="#/about">[03] ABOUT</a>
        <a href="arcade.html" style="text-decoration: underline">[04] ARCADE</a>
      </nav>
    </header>

    <div class="hero">
      <h1>THE ARCADE.</h1>
      <p>// Take a break. Play some games built with raw HTML5 Canvas and vanilla JS physics.</p>
    </div>

    <div class="cabinet">
      <div style="position: relative; display: inline-block;">
        <canvas id="gameCanvas" width="800" height="500"></canvas>

        <div class="menu-overlay" id="mainMenu">
          <h2>SELECT GAME</h2>
          <button class="menu-btn blue" onclick="startGame('snake')">[NEON SNAKE]</button>
          <button class="menu-btn purple" onclick="startGame('flappy')">[FLAPPY UFO]</button>
          <button class="menu-btn pink" onclick="startGame('breakout')">[BREAKOUT]</button>
          <button class="menu-btn cyan" onclick="startGame('asteroids')">[ASTEROIDS]</button>
        </div>

        <div class="gameover-overlay" id="gameOverScreen">
          <h2>GAME OVER</h2>
          <div class="score" id="finalScore">Score: 0</div>
          <button class="menu-btn" onclick="restartCurrentGame()">[PLAY AGAIN]</button>
          <button class="menu-btn" onclick="showMainMenu()">[MAIN MENU]</button>
        </div>

        <div class="hud" id="scoreHud">Score: 0</div>
      </div>
    </div>

    <div class="mobile-controls">
      <div class="dpad">
        <button class="up" data-dir="up">&uarr;</button>
        <button class="left" data-dir="left">&larr;</button>
        <button class="right" data-dir="right">&rarr;</button>
        <button class="down" data-dir="down">&darr;</button>
      </div>
      <div class="action-btns">
        <button class="btn-b" data-btn="b">B</button>
        <button class="btn-a" data-btn="a">A</button>
      </div>
    </div>

    <div class="instructions">
      Desktop: Arrows / Space / Mouse &bull; Mobile: D-Pad + Buttons
    </div>

    <footer>
      // SAMUEL BATES &bull; ARCADE &bull; 2026
    </footer>
  </div>

  <script src="arcade.js"></script>
</body>
</html>
