<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Arcade | Samuel Bates</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Space Mono', monospace;
      background: #e5e5e5;
      color: #000;
      padding: 1.5rem;
      min-height: 100vh;
      display: flex;
      justify-content: center;
    }
    .shell {
      width: 100%;
      max-width: 1200px;
      background: #fff;
      border: 4px solid #000;
      box-shadow: 12px 12px 0px #000;
    }
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1rem;
      border-bottom: 4px solid #000;
    }
    .logo {
      font-weight: 700;
      font-size: 1.5rem;
      letter-spacing: -0.05em;
      text-decoration: none;
      color: #000;
    }
    .logo span { color: #2563eb; }
    nav a {
      font-weight: 700;
      font-size: 0.875rem;
      text-transform: uppercase;
      text-decoration: none;
      color: #000;
      margin-left: 2rem;
    }
    nav a:hover { text-decoration: underline; }
    .hero-section {
      padding: 2rem;
      border-bottom: 4px solid #000;
      text-align: center;
    }
    .hero-section h1 {
      font-size: 3rem;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: -0.05em;
      margin-bottom: 0.5rem;
    }
    .hero-section p {
      font-weight: 700;
      text-transform: uppercase;
      font-size: 0.875rem;
      opacity: 0.7;
    }
    .arcade-cabinet {
      padding: 2rem;
      display: flex;
      align-items: center;
      justify-content: center;
      border-bottom: 4px solid #000;
      background: #f4f4f0;
      position: relative;
      overflow: hidden;
      min-height: 500px;
    }
    canvas {
      border: 4px solid #000;
      background: rgba(15, 23, 42, 0.6);
      display: block;
      max-width: 100%;
      z-index: 10;
    }
    #arcade-menu, #game-over-screen {
      position: absolute;
      z-index: 20;
      text-align: center;
      color: white;
    }
    #arcade-menu h2, #game-over-screen h2 {
      font-family: 'Space Mono', monospace;
      text-transform: uppercase;
    }
    #arcade-menu h2 {
      font-size: 2rem;
      font-weight: 900;
      margin-bottom: 1.5rem;
      text-shadow: 0 0 10px rgba(255,255,255,0.5);
    }
    #game-over-screen {
      display: none;
    }
    #game-over-screen h2 {
      font-size: 2.5rem;
      font-weight: 900;
      color: #ef4444;
      text-shadow: 0 0 15px rgba(239, 68, 68, 0.6);
      margin-bottom: 0.5rem;
    }
    #final-score {
      font-size: 1.5rem;
      margin-bottom: 2rem;
    }
    .arcade-btn, .game-btn {
      font-family: 'Space Mono', monospace;
      font-weight: 700;
      font-size: 0.875rem;
      text-transform: uppercase;
      border: 4px solid #fff;
      background: transparent;
      color: #fff;
      padding: 0.75rem 2rem;
      margin: 0.25rem;
      cursor: pointer;
      min-width: 180px;
      transition: background 0.15s, color 0.15s;
    }
    .arcade-btn:hover, .game-btn:hover {
      background: #fff;
      color: #000;
    }
    #btn-snake:hover { background: rgba(37, 99, 235, 0.9); color: #fff; }
    #btn-flappy:hover { background: rgba(139, 92, 246, 0.9); color: #fff; }
    #btn-breakout:hover { background: rgba(236, 72, 153, 0.9); color: #fff; }
    #btn-asteroids:hover { background: rgba(6, 182, 212, 0.9); color: #fff; }
    #hud-score {
      position: absolute;
      top: 2rem;
      left: 3rem;
      z-index: 15;
      color: rgba(255,255,255,0.8);
      font-family: monospace;
      font-size: 1.5rem;
      font-weight: bold;
      display: none;
    }
    .mobile-controls {
      display: none;
      padding: 1rem;
      border-bottom: 4px solid #000;
      justify-content: space-between;
      align-items: center;
    }
    .d-pad {
      display: grid;
      grid-template-areas: ". up ." "left . right" ". down .";
      gap: 4px;
    }
    .d-pad-btn {
      width: 48px;
      height: 48px;
      border: 3px solid #000;
      background: #fff;
      font-size: 1.25rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .d-pad-btn.up { grid-area: up; }
    .d-pad-btn.left { grid-area: left; }
    .d-pad-btn.right { grid-area: right; }
    .d-pad-btn.down { grid-area: down; }
    .action-buttons { display: flex; gap: 8px; }
    .action-btn {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      border: 3px solid #000;
      background: #fff;
      font-family: 'Space Mono', monospace;
      font-weight: 700;
      cursor: pointer;
    }
    .a-btn { background: #dbeafe; }
    .b-btn { background: #fee2e2; }
    .instructions {
      padding: 1rem;
      text-align: center;
      font-weight: 700;
      text-transform: uppercase;
      font-size: 0.75rem;
      opacity: 0.6;
      border-bottom: 4px solid #000;
    }
    footer {
      padding: 1rem;
      text-align: center;
      font-weight: 700;
      font-size: 0.75rem;
      text-transform: uppercase;
      opacity: 0.6;
    }
    @media (max-width: 768px) {
      body { padding: 0.5rem; }
      .shell { border-width: 3px; box-shadow: 6px 6px 0px #000; }
      header, .hero-section, .arcade-cabinet, .instructions, footer { border-bottom-width: 3px; }
      .hero-section h1 { font-size: 1.75rem; }
      nav { display: none; }

      /* Cabinet: less padding, canvas fills width */
      .arcade-cabinet { padding: 0.5rem; min-height: auto; }

      /* Game menu: vertical stack, full-width buttons */
      #arcade-menu h2 { font-size: 1.5rem; margin-bottom: 1rem; }
      #arcade-menu > div { flex-direction: column; gap: 0.5rem; padding: 0 1.5rem; }
      .arcade-btn { min-width: unset; width: 100%; padding: 0.75rem 1rem; }

      /* Game over: full-width buttons */
      #game-over-screen h2 { font-size: 2rem; }
      #game-over-screen > div { flex-direction: column; padding: 0 1.5rem; }
      .game-btn { min-width: unset; width: 100%; }

      /* Mobile controls: dark controller pad, bigger touch targets */
      .mobile-controls {
        display: flex;
        padding: 1.25rem 1.5rem;
        background: #111;
        border-color: #111;
      }
      .d-pad { gap: 6px; }
      .d-pad-btn {
        width: 56px;
        height: 56px;
        background: #222;
        color: #fff;
        border-color: #444;
        font-size: 1.5rem;
      }
      .d-pad-btn:active { background: #444; }
      .action-buttons { gap: 12px; align-items: center; }
      .action-btn {
        width: 64px;
        height: 64px;
        font-size: 1rem;
      }
      .a-btn { background: #1e3a5f; color: #fff; border-color: #2563eb; }
      .b-btn { background: #5f1e1e; color: #fff; border-color: #ef4444; }
      .a-btn:active { background: #2563eb; }
      .b-btn:active { background: #ef4444; }
    }
  </style>
</head>
<body>
  <div class="shell">
    <header>
      <a href="/portfolio/#/" class="logo">SB<span>.</span></a>
      <nav>
        <a href="/portfolio/#/">[01] HOME</a>
        <a href="/portfolio/#/work">[02] WORK</a>
        <a href="/portfolio/#/about">[03] ABOUT</a>
        <a href="arcade.html" style="text-decoration: underline">[04] ARCADE</a>
      </nav>
    </header>

    <div class="hero-section">
      <h1>THE ARCADE.</h1>
      <p>// Take a break. Play some games built with raw HTML5 Canvas and vanilla JS physics.</p>
    </div>

    <div class="arcade-cabinet">
      <canvas id="gameCanvas" width="800" height="500"></canvas>

      <!-- Main Menu Overlay (IDs must match arcade.js) -->
      <div id="arcade-menu">
        <h2>Select Game</h2>
        <div style="display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap;">
          <button id="btn-snake" class="arcade-btn" style="background: rgba(37, 99, 235, 0.8);">Neon Snake</button>
          <button id="btn-flappy" class="arcade-btn" style="background: rgba(139, 92, 246, 0.8);">Flappy UFO</button>
          <button id="btn-breakout" class="arcade-btn" style="background: rgba(236, 72, 153, 0.8);">Breakout</button>
          <button id="btn-asteroids" class="arcade-btn" style="background: rgba(6, 182, 212, 0.8);">Asteroids</button>
        </div>
      </div>

      <!-- Game Over Overlay -->
      <div id="game-over-screen">
        <h2>GAME OVER</h2>
        <p id="final-score" style="font-size: 1.5rem; margin-bottom: 2rem;">Score: 0</p>
        <div style="display: flex; gap: 1rem; justify-content: center;">
          <button id="btn-restart" class="game-btn">Play Again</button>
          <button id="btn-menu" class="game-btn">Main Menu</button>
        </div>
      </div>

      <!-- Runtime Score Display -->
      <div id="hud-score">
        Score: <span id="current-score">0</span>
      </div>
    </div>

    <!-- Mobile On-Screen Controls (IDs must match arcade.js) -->
    <div id="mobile-controls" class="mobile-controls">
      <div class="d-pad">
        <button id="btn-up" class="d-pad-btn up"><i class='bx bx-chevron-up'></i></button>
        <button id="btn-left" class="d-pad-btn left"><i class='bx bx-chevron-left'></i></button>
        <button id="btn-right" class="d-pad-btn right"><i class='bx bx-chevron-right'></i></button>
        <button id="btn-down" class="d-pad-btn down"><i class='bx bx-chevron-down'></i></button>
      </div>
      <div class="action-buttons">
        <button id="btn-action-b" class="action-btn b-btn">B</button>
        <button id="btn-action-a" class="action-btn a-btn">A</button>
      </div>
    </div>

    <div class="instructions">
      Desktop: Arrows / Space / Mouse &bull; Mobile: D-Pad + Buttons
    </div>

    <footer>
      // SAMUEL BATES &bull; ARCADE &bull; 2026
    </footer>
  </div>

  <script src="arcade.js"></script>
</body>
</html>
